name: Update English Tamil Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "15 22 * * *"

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and translate calendar
        run: node scripts/update-calendar.mjs

      - name: Save updated calendar data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/calendar.json
          git diff --cached --quiet || git commit -m "Update Tamil calendar data"
          git push
