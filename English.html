<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=480">
<meta http-equiv="refresh" content="3600">
<title>English Tamil Calendar</title>

<style>
html, body {
    margin: 0;
    width: 800px;
    height: 480px;
    overflow: hidden;
    background: #f7f4ea;
    color: #111;
    font-family: Arial, Helvetica, sans-serif;
}

* {
    box-sizing: border-box;
}

.page {
    width: 800px;
    height: 480px;
    padding: 18px 22px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 3px solid #222;
    padding-bottom: 10px;
    margin-bottom: 12px;
}

.title {
    font-size: 27px;
    font-weight: 700;
}

.subtitle {
    margin-top: 3px;
    font-size: 14px;
}

.date {
    max-width: 340px;
    font-size: 18px;
    font-weight: 700;
    text-align: right;
}

.tamil-date {
    margin-top: 4px;
    font-size: 15px;
    font-weight: 600;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px 17px;
}

.card {
    min-height: 54px;
    padding: 8px 11px;
    border: 1.5px solid #222;
    border-radius: 8px;
    background: #fffdf6;
}

.label {
    margin-bottom: 4px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.25px;
    text-transform: uppercase;
}

.value {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.2;
}

.small {
    font-size: 14px;
}

.footer {
    margin-top: 10px;
    padding-top: 7px;
    border-top: 1px solid #777;
    font-size: 12px;
}

.note {
    margin-top: 8px;
    padding: 8px 10px;
    border: 1px solid #777;
    border-radius: 6px;
    background: #fffdf6;
    font-size: 13px;
    line-height: 1.2;
}

.note strong {
    display: block;
    margin-bottom: 3px;
}
</style>
</head>

<body>
<div class="page">
    <div class="header">
        <div>
            <div class="title">Tamil Daily Calendar</div>
            <div class="subtitle">English reference display</div>
        </div>

        <div class="date">
            <div id="date">Loading...</div>
            <div id="tamilDate" class="tamil-date">Loading...</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="label">Nalla Neram</div>
            <div class="value" id="nallaNeram">—</div>
        </div>

        <div class="card">
            <div class="label">Gowri Nalla Neram</div>
            <div class="value" id="gowriNeram">—</div>
        </div>

        <div class="card">
            <div class="label">Rahu Kaalam</div>
            <div class="value" id="rahuKaalam">—</div>
        </div>

        <div class="card">
            <div class="label">Yamagandam</div>
            <div class="value" id="yamagandam">—</div>
        </div>

        <div class="card">
            <div class="label">Kuligai</div>
            <div class="value" id="kuligai">—</div>
        </div>

        <div class="card">
            <div class="label">Sunrise</div>
            <div class="value" id="sunrise">—</div>
        </div>

        <div class="card">
            <div class="label">Tithi</div>
            <div class="value small" id="thithi">—</div>
        </div>

        <div class="card">
            <div class="label">Nakshatra / Star</div>
            <div class="value small" id="star">—</div>
        </div>
    </div>

    <div class="note">
        <strong>Soolam / Remedy</strong>
        <span id="soolam">—</span>
        <span> · </span>
        <span id="parigaram">—</span>
    </div>

    <div class="note">
        <strong>Today’s Note</strong>
        <span id="subakariyam">—</span>
    </div>

    <div class="footer">
        Calendar source: Tamil Daily Calendar · Updated once daily
    </div>
</div>

<script>
const fields = {
    date: "date",
    tamilDate: "tamil_date",
    nallaNeram: "nalla_neram",
    gowriNeram: "gowri_nalla_neram",
    rahuKaalam: "rahu_kaalam",
    yamagandam: "yamagandam",
    kuligai: "kuligai",
    sunrise: "sunrise",
    thithi: "thithi",
    star: "star",
    soolam: "soolam",
    parigaram: "parigaram",
    subakariyam: "subakariyam"
};

fetch("data/calendar.json?ts=" + Date.now())
    .then(response => {
        if (!response.ok) throw new Error("Calendar data unavailable");
        return response.json();
    })
    .then(data => {
        for (const [elementId, jsonKey] of Object.entries(fields)) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = data[jsonKey] || "Not available";
            }
        }
    })
    .catch(() => {
        document.getElementById("date").textContent = "Calendar data unavailable";
    });
</script>
</body>
</html>
